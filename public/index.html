<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Edutech Radar · 교육 업계 동향</title>
<meta name="description" content="AIDT, 에듀테크, 주요 교과서 출판사 뉴스를 한 곳에서 모아보는 큐레이션." />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- ===== 백그라운드 블롭 ===== -->
<div class="bg-blobs" aria-hidden="true">
  <div class="blob blob--1"></div>
  <div class="blob blob--2"></div>
  <div class="blob blob--3"></div>
</div>

<!-- ===== 헤더 ===== -->
<header class="header">
  <div class="header-inner">
    <a href="#" class="brand">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.8"/>
          <circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="1.8"/>
          <circle cx="12" cy="12" r="1.6" fill="currentColor"/>
          <line x1="12" y1="2" x2="12" y2="22" stroke="currentColor" stroke-width="1.2" stroke-dasharray="2 2" opacity="0.4"/>
          <line x1="2" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="1.2" stroke-dasharray="2 2" opacity="0.4"/>
        </svg>
      </span>
      <span class="brand-text">
        <span class="brand-name">Edutech Radar</span>
        <span class="brand-sub">교육 업계 데일리</span>
      </span>
    </a>

    <div class="header-actions">
      <div class="status-pill" id="statusBar">
        <span class="status-dot"></span>
        <span class="status-text">동기화 중</span>
      </div>
      <button class="theme-toggle" id="themeToggle" aria-label="테마 변경">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </div>
</header>

<!-- ===== 히어로 ===== -->
<section class="hero">
  <div class="hero-inner">
    <div class="hero-badge">
      <span class="badge-dot"></span>
      <span><span id="todayDate">—</span> · 자동 수집 큐레이션</span>
    </div>
    <h1 class="hero-title">
      <span>오늘의</span>
      <span class="hero-accent">교육 업계,</span>
      <span class="hero-italic"><em>한 화면에.</em></span>
    </h1>
    <p class="hero-desc">
      AI 디지털 교과서, 에듀테크, 주요 출판사 뉴스를 30분마다 자동으로 모아드려요.
    </p>

    <div class="hero-stats">
      <div class="stat">
        <div class="stat-num" id="statCount">—</div>
        <div class="stat-label">전체 콘텐츠</div>
      </div>
      <div class="stat">
        <div class="stat-num">22</div>
        <div class="stat-label">뉴스 키워드</div>
      </div>
      <div class="stat">
        <div class="stat-num">7</div>
        <div class="stat-label">유튜브 채널</div>
      </div>
      <div class="stat">
        <div class="stat-num">8</div>
        <div class="stat-label">블로그 모니터링</div>
      </div>
      <div class="stat">
        <div class="stat-num">2026</div>
        <div class="stat-label">학사 캘린더</div>
      </div>
    </div>
  </div>
</section>

<!-- ===== 채널 탭 ===== -->
<section class="channels" aria-label="채널 선택">
  <div class="channels-inner" role="tablist">
    <button class="channel-tab is-active" data-channel="news" role="tab" aria-selected="true">
      <span class="channel-icon" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/>
          <path d="M18 14h-8M15 18h-5M10 6h8v4h-8V6z"/>
        </svg>
      </span>
      <span class="channel-label">
        <span class="channel-name">뉴스</span>
        <span class="channel-desc">언론사 기사</span>
      </span>
    </button>

    <button class="channel-tab" data-channel="youtube" role="tab" aria-selected="false">
      <span class="channel-icon" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33A2.78 2.78 0 0 0 3.4 19c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2 29 29 0 0 0 .46-5.25 29 29 0 0 0-.46-5.33z"/>
          <polygon points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02"/>
        </svg>
      </span>
      <span class="channel-label">
        <span class="channel-name">유튜브</span>
        <span class="channel-desc">공식 채널 영상</span>
      </span>
    </button>

    <button class="channel-tab" data-channel="blog" role="tab" aria-selected="false">
      <span class="channel-icon" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
        </svg>
      </span>
      <span class="channel-label">
        <span class="channel-name">블로그</span>
        <span class="channel-desc">공식 블로그 글</span>
      </span>
    </button>
  </div>
</section>

<!-- ===== 콘텐츠 구분 탭 (교과서/교재/AIDT) ===== -->
<section class="cat-tabs" aria-label="콘텐츠 구분">
  <div class="cat-tabs-inner" id="catTabs">
    <button class="cat-tab is-active" data-cat="all">전체</button>
    <button class="cat-tab" data-cat="textbook">교과서</button>
    <button class="cat-tab" data-cat="workbook">교재</button>
    <button class="cat-tab" data-cat="aidt">AIDT</button>
  </div>
</section>

<!-- ===== 소스 탭 ===== -->
<section class="source-tabs" aria-label="소스 선택">
  <div class="tabs-inner" id="sourceTabs">
    <button class="src-tab is-active" data-source="news">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8M15 18h-5M10 6h8v4h-8V6z"/></svg>
      <span>뉴스</span>
      <span class="tab-count" id="countNews">—</span>
    </button>
    <button class="src-tab" data-source="youtube">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33A2.78 2.78 0 0 0 3.4 19c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2 29 29 0 0 0 .46-5.25 29 29 0 0 0-.46-5.33z"/><polygon points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02"/></svg>
      <span>유튜브</span>
      <span class="tab-count" id="countYoutube">—</span>
    </button>
    <button class="src-tab" data-source="blog">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      <span>블로그</span>
      <span class="tab-count" id="countBlog">—</span>
    </button>
    <button class="src-tab" data-source="calendar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>학사일정</span>
      <span class="tab-count" id="countCalendar">—</span>
    </button>
  </div>
</section>

<!-- ===== 컨트롤 ===== -->
<section class="controls" aria-label="필터 및 정렬">
  <div class="controls-inner">

    <div class="control-group">
      <div class="control-label">정렬</div>
      <div class="chip-row" id="sortGroup">
        <button class="chip is-active" data-sort="date">최신순</button>
        <button class="chip" data-sort="popular">인기순</button>
      </div>
    </div>

    <div class="control-group">
      <div class="control-label">기간</div>
      <div class="chip-row" id="periodGroup">
        <button class="chip is-active" data-period="all">전체</button>
        <button class="chip" data-period="week">주별</button>
        <button class="chip" data-period="month">월별</button>
      </div>
      <div class="period-nav" id="periodNav" hidden>
        <button class="period-nav-btn" id="periodPrev" aria-label="이전">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <span class="period-label" id="periodLabel">—</span>
        <button class="period-nav-btn" id="periodNext" aria-label="다음">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
    </div>

    <div class="control-group">
      <div class="control-label">주제</div>
      <div class="chip-row" id="topicGroup">
        <button class="chip is-active" data-topic="all">전체</button>
        <button class="chip" data-topic="AIDT">AI 디지털 교육자료</button>
        <button class="chip" data-topic="에듀테크">에듀테크</button>
        <button class="chip" data-topic="정책">정책</button>
        <button class="chip" data-topic="교육청">교육청</button>
      </div>
    </div>

    <div class="control-group">
      <div class="control-label">출판사</div>
      <div class="chip-row" id="publisherGroup">
        <button class="chip is-active" data-publisher="all">전체</button>
        <button class="chip" data-publisher="천재교육">천재교육</button>
        <button class="chip" data-publisher="천재교과서">천재교과서</button>
        <button class="chip" data-publisher="YBM">YBM</button>
        <button class="chip" data-publisher="능률">능률</button>
        <button class="chip" data-publisher="동아">동아</button>
        <button class="chip" data-publisher="아이스크림미디어">아이스크림</button>
        <button class="chip" data-publisher="비상교육">비상교육</button>
        <button class="chip" data-publisher="미래엔">미래엔</button>
        <button class="chip" data-publisher="금성">금성</button>
      </div>
    </div>

    <div class="view-switch" role="tablist">
      <button class="view-btn is-active" id="viewGrid" role="tab" aria-selected="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>카드</span>
      </button>
      <button class="view-btn" id="viewWeekly" role="tab" aria-selected="false">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>주간 요약</span>
      </button>
    </div>

  </div>

  <div class="meta-bar">
    <span id="countText">— 건</span>
    <span class="meta-dot">•</span>
    <span id="updatedText">갱신: —</span>
  </div>
</section>

<!-- ===== 피드 ===== -->
<main class="feed-wrap">
  <div class="feed" id="feed" aria-live="polite">
    <div class="skel skel--feature"></div>
    <div class="skel"></div>
    <div class="skel"></div>
    <div class="skel"></div>
    <div class="skel"></div>
    <div class="skel"></div>
  </div>
</main>

<template id="emptyTemplate">
  <div class="empty">
    <div class="empty-icon">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </div>
    <h3>해당 조건의 기사가 없어요</h3>
    <p>필터를 조정해보세요</p>
  </div>
</template>

<!-- ===== 푸터 ===== -->
<footer class="footer">
  <div class="footer-inner">
    <div class="footer-brand">
      <span class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.8"/>
          <circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="1.8"/>
          <circle cx="12" cy="12" r="1.6" fill="currentColor"/>
        </svg>
      </span>
      <span>Edutech Radar</span>
    </div>
    <div class="footer-meta">
      <span>Source · Google News RSS</span>
      <span class="meta-dot">•</span>
      <span>30분 캐시 자동 갱신</span>
      <span class="meta-dot">•</span>
      <span>기사 원문은 각 언론사에서 확인하세요</span>
    </div>
  </div>
</footer>

<script src="app.js"></script>
</body>
</html>
